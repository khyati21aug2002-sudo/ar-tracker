<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR Sky Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; color:#fff; user-select:none; -webkit-user-select:none; }
canvas { position:absolute; top:0; left:0; width:100vw; height:100vh; z-index:1; }
.panel { position:fixed; background:rgba(0,10,30,0.9); border:1px solid rgba(0,180,255,0.22); border-radius:12px; padding:12px 16px; z-index:100; min-width:220px; }
.panel h1 { font-size:11px; letter-spacing:2px; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid rgba(0,180,255,0.18); color:#ff9900; }
.row { display:flex; justify-content:space-between; padding:4px 0; font-size:10px; }
.lbl { color:#3d7a9a; } .val { color:#eee; font-weight:bold; }
#pa { top:env(safe-area-inset-top, 20px); left:15px; }
#controls { position:fixed; bottom:30px; right:15px; display:flex; flex-direction:column; gap:8px; z-index:100; }
.btn { background:rgba(0,25,60,0.95); border:1px solid rgba(0,180,255,0.4); border-radius:10px; color:#fff; font-size:11px; padding:12px; cursor:pointer; }
.btn-ar { background:#004488; border-color:#00eeff; font-weight:bold; }
#compass { position:fixed; top:15px; left:50%; transform:translateX(-50%); font-size:12px; letter-spacing:3px; color:#00eeff; z-index:100; text-shadow:0 0 5px #000; }
.reticle { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:40px; height:40px; border:1px solid rgba(0,238,255,0.3); pointer-events:none; z-index:100; }
#loading { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); color:#00eeff; font-size:14px; z-index:50; }
#you-hud { display:none; position:fixed; top:40%; left:50%; transform:translateX(-50%); text-align:center; color:#00ff88; font-weight:bold; font-size:18px; text-shadow:0 0 10px #000; z-index:100; pointer-events:none;}
#you-dir-lbl { font-size:12px; color:#fff; display:block; margin-top:4px; }
</style>
</head>
<body>
<div id="loading">INITIALIZING...</div>
<canvas id="c"></canvas>
<div class="reticle"></div>

<div id="you-hud">👤 YOU<br><span id="you-dir-lbl">FACING NORTH</span><br>⬇</div>

<div class="panel" id="pa">
  <h1>📡 AR SKY TRACKER</h1>
  <div class="row"><span class="lbl">LAT / LON</span><span class="val" id="u-ll">30.31° N / 78.03° E</span></div>
  <div class="row" style="margin-top:8px; border-top:1px dashed #333; padding-top:8px;"><span class="lbl">TARGET</span><span class="val" style="color:#ff9900;">ARTEMIS II</span></div>
  <div class="row"><span class="lbl">ALTITUDE</span><span class="val" id="a-alt">--</span></div>
  <div class="row"><span class="lbl">AZIMUTH</span><span class="val" id="a-az">--</span></div>
  <div class="row"><span class="lbl">VISIBLE?</span><span class="val" id="a-vis">--</span></div>
</div>

<div id="compass">HEADING: <span id="comp-dir">NORTH</span></div>

<div id="controls">
    <button class="btn" onclick="toggleYou()" id="btn-you">👤 Show "YOU" Dir</button>
    <button class="btn" onclick="getLocation()" id="btn-gps">📍 Sync Phone GPS</button>
    <button class="btn" onclick="toggleLabels()" id="btn-lbls">🏷️ Hide Labels</button>
    <button class="btn btn-ar" onclick="initGyro()" id="btn-gyro">📳 Enable AR (Gyro)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', () => {
    document.getElementById('loading').style.display = 'none';
    let MY_LAT = 30.3165, MY_LON = 78.0322, arEnabled = false, showLabels = true, showYou = false;
    const R = 900;

    const STARS = [[6.75,-16.71,-1.46,"Sirius"],[14.26,19.18,-0.05,"Arcturus"],[18.61,38.78,0.03,"Vega"],[5.27,45.99,0.08,"Capella"],[5.24,-8.20,0.13,"Rigel"],[7.65,5.22,0.38,"Procyon"],[5.91,7.40,0.50,"Betelgeuse"],[19.84,8.86,0.76,"Altair"]];
    const CONSTELLATIONS = [{name:"Orion",segs:[[[5.53,-0.29],[5.60,-1.20],[5.68,-1.94]],[[5.91,7.40],[5.60,-1.20]],[[5.41,6.35],[5.60,-1.20]],[[5.24,-8.20],[5.60,-1.20]],[[5.91,7.40],[5.41,6.35]]]}];

    function eqToAltAz(ra, dec, lat, lon, date) {
        let jd = date.getTime()/86400000 + 2440587.5;
        let lst = ((18.697 + 24.0657 * (jd - 2451545.0)) + lon/15) % 24;
        if(lst<0) lst+=24;
        let ha = (lst - ra) * 15 * Math.PI/180;
        let rDec = dec * Math.PI/180, rLat = lat * Math.PI/180;
        let sAlt = Math.sin(rDec)*Math.sin(rLat) + Math.cos(rDec)*Math.cos(rLat)*Math.cos(ha);
        let alt = Math.asin(sAlt);
        let cAz = (Math.sin(rDec) - Math.sin(rLat)*sAlt) / (Math.cos(rLat)*Math.cos(alt));
        let sAz = (-Math.sin(ha)*Math.cos(rDec)) / Math.cos(alt);
        let az = Math.atan2(sAz, cAz);
        return { alt: alt*180/Math.PI, az: (az*180/Math.PI+360)%360 };
    }
    
    function a2v(alt, az, r) {
        let rAlt=alt*Math.PI/180, rAz=az*Math.PI/180;
        return new THREE.Vector3(r*Math.cos(rAlt)*Math.sin(rAz), r*Math.sin(rAlt), -r*Math.cos(rAlt)*Math.cos(rAz));
    }
    
    function makeLbl(txt, c, sz) {
        let cv = document.createElement('canvas'), ctx = cv.getContext('2d');
        ctx.font = "bold 32px monospace"; let m = ctx.measureText(txt);
        cv.width=m.width+20; cv.height=40; ctx.font="bold 32px monospace"; ctx.fillStyle=c;
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(txt, cv.width/2, 20);
        let sp = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv)}));
        sp.scale.set(cv.width*sz, cv.height*sz, 1); return sp;
    }

    const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
    camera.position.set(0,5,0); const sky = new THREE.Group(); scene.add(sky);

    let grnd = new THREE.Mesh(new THREE.CircleGeometry(R,32), new THREE.MeshBasicMaterial({color:0x0a101a}));
    grnd.rotation.x = -Math.PI/2; scene.add(grnd);

    const objs = [], lbls = [];
    [{l:'NORTH',a:0},{l:'EAST',a:90},{l:'SOUTH',a:180},{l:'WEST',a:270}].forEach(d => {
        let s = makeLbl(d.l, '#00ddff', 1.0); s.position.copy(a2v(1, d.a, R-100)); scene.add(s);
    });

    STARS.forEach(s => {
        let m = new THREE.Mesh(new THREE.SphereGeometry(3,8,8), new THREE.MeshBasicMaterial({color:0xffffff}));
        m.ra=s[0]; m.dec=s[1]; sky.add(m); objs.push(m);
        let l = makeLbl(s[3], '#c8dcff', 0.5); l.ra=s[0]; l.dec=s[1]; sky.add(l); lbls.push(l);
    });

    CONSTELLATIONS.forEach(c => {
        c.segs.forEach(seg => {
            let pts = new Float32Array(seg.length*3);
            let ln = new THREE.Line(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(pts,3)), new THREE.LineBasicMaterial({color:0x3366ff}));
            ln.seg=seg; sky.add(ln); objs.push(ln);
        });
        let cl = makeLbl(c.name, '#3366ff', 0.6); cl.ra=c.segs[0][0][0]; cl.dec=c.segs[0][0][1]; sky.add(cl); lbls.push(cl);
    });

    const art = new THREE.Mesh(new THREE.SphereGeometry(10,16,16), new THREE.MeshBasicMaterial({color:0xff9900}));
    art.ra=12.9; art.dec=-5.2; sky.add(art); objs.push(art);
    const aLbl = makeLbl("ARTEMIS II", '#ffaa00', 0.6); sky.add(aLbl);

    let isD=false, pM={x:0,y:0}, cLon=180, cLat=20;
    renderer.domElement.addEventListener('touchstart',e=>{if(!arEnabled){isD=true; pM={x:e.touches[0].clientX,y:e.touches[0].clientY};}});
    window.addEventListener('touchend',()=>isD=false);
    window.addEventListener('touchmove',e=>{if(isD&&!arEnabled){cLon-=(e.touches[0].clientX-pM.x)*0.2; cLat-=(e.touches[0].clientY-pM.y)*0.2; cLat=Math.max(-10,Math.min(89,cLat)); updCam(); pM={x:e.touches[0].clientX,y:e.touches[0].clientY};}});

    function updCam() {
        let phi = (90-cLat)*Math.PI/180, th = cLon*Math.PI/180;
        camera.lookAt(camera.position.x+100*Math.sin(phi)*Math.sin(th), camera.position.y+100*Math.cos(phi), camera.position.z-100*Math.sin(phi)*Math.cos(th));
        updateCompassData(cLon);
    }

    function updateCompassData(degrees) {
        let d = (degrees%360+360)%360, dir="NORTH";
        if(d>45&&d<=135) dir="EAST"; else if(d>135&&d<=225) dir="SOUTH"; else if(d>225&&d<=315) dir="WEST";
        document.getElementById('comp-dir').textContent=dir;
        document.getElementById('you-dir-lbl').textContent = "FACING " + dir;
    }

    // AR GYRO LOGIC (WITH iOS WEBKIT COMPASS FIX)
    window.initGyro = async function() {
        if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
            try {
                if(await DeviceOrientationEvent.requestPermission() === 'granted') startGyro();
            }catch(e){alert("Gyro error");}
        } else startGyro();
    }
    
    function startGyro(){ window.addEventListener('deviceorientation',e=>{
        if(!arEnabled) return;
        
        // Find True North: Use Apple's webkitCompassHeading if available, otherwise fallback
        let heading = e.webkitCompassHeading ? e.webkitCompassHeading : (360 - (e.alpha || 0));
        let alphaRad = e.webkitCompassHeading ? (360 - e.webkitCompassHeading) * Math.PI/180 : (e.alpha||0)*Math.PI/180;
        let betaRad = (e.beta||0)*Math.PI/180;
        let gammaRad = (e.gamma||0)*Math.PI/180;
        
        camera.quaternion.setFromEuler(new THREE.Euler(betaRad, alphaRad, -gammaRad, 'YXZ'));
        updateCompassData(heading);

    }, true); arEnabled=true; document.getElementById('btn-gyro').textContent="✅ AR ACTIVE"; document.getElementById('btn-gyro').style.background="#008844"; }

    window.toggleLabels = function() { showLabels=!showLabels; document.getElementById('btn-lbls').textContent=showLabels?"🏷️ Hide Labels":"🏷️ Show Labels"; aLbl.visible=showLabels; }
    
    window.toggleYou = function() {
        showYou = !showYou;
        document.getElementById('you-hud').style.display = showYou ? 'block' : 'none';
        document.getElementById('btn-you').style.background = showYou ? '#008844' : 'rgba(0,25,60,0.95)';
    }
    
    window.getLocation = function() {
        let btn = document.getElementById('btn-gps');
        btn.textContent="⏳ Locating...";
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p=>{
                MY_LAT=p.coords.latitude; MY_LON=p.coords.longitude;
                document.getElementById('u-ll').textContent=`${MY_LAT.toFixed(2)}°N / ${MY_LON.toFixed(2)}°E`;
                btn.textContent="✅ GPS Synced";
            }, e=>{ 
                btn.textContent="❌ GPS Denied";
                alert("GPS failed. Check iOS Settings > Safari > Location.");
            }, { enableHighAccuracy: true });
        }
    }

    async function fetchNASA() {
        try {
            let n=new Date(), ymd=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            let res = await fetch(`https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='-1024'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='OBSERVER'&CENTER='500@399'&START_TIME='${ymd(n)}'&STOP_TIME='${ymd(new Date(n.getTime()+86400000))}'&STEP_SIZE='1 h'&QUANTITIES='1'`);
            let j=await res.json(), s=j.result.indexOf('$$SOE'), e=j.result.indexOf('$$EOE');
            if(s>-1){ let m = j.result.substring(s+5,e).trim().split('\n').pop().match(/\s+(\d{1,2})\s+(\d{2})\s+([\d.]+)\s+([+-]\d{1,3})\s+(\d{2})\s+([\d.]+)/);
                if(m){ art.ra=+m[1]+ +m[2]/60+ +m[3]/3600; art.dec=(+m[4]<0?-1:1)*(Math.abs(+m[4])+ +m[5]/60+ +m[6]/3600); }
            }
        }catch(e){}
    }

    function animate() {
        let n=new Date();
        objs.forEach(m => {
            if(m.geometry&&m.geometry.type==="BufferGeometry"&&m.seg) {
                let p=m.geometry.attributes.position, vis=false;
                for(let i=0;i<m.seg.length;i++){
                    let hz = eqToAltAz(m.seg[i][0], m.seg[i][1], MY_LAT, MY_LON, n);
                    if(hz.alt>0) vis=true;
                    let v = a2v(hz.alt, hz.az, R-55); p.setXYZ(i, v.x, v.y, v.z);
                }
                p.needsUpdate=true; m.visible=vis;
            } else {
                let hz = eqToAltAz(m.ra, m.dec, MY_LAT, MY_LON, n);
                m.position.copy(a2v(hz.alt, hz.az, R-(m===art?65:50))); m.visible=hz.alt>-5;
            }
        });
        lbls.forEach(l => {
            let hz = eqToAltAz(l.ra, l.dec, MY_LAT, MY_LON, n);
            l.position.copy(a2v(hz.alt+2, hz.az, R-60)); l.visible=showLabels&&hz.alt>0;
        });
        
        let aHz = eqToAltAz(art.ra, art.dec, MY_LAT, MY_LON, n);
        aLbl.position.copy(a2v(aHz.alt+3, aHz.az, R-65)); aLbl.visible=showLabels&&aHz.alt>0;
        document.getElementById('a-alt').textContent=aHz.alt.toFixed(1)+'°';
        document.getElementById('a-az').textContent=aHz.az.toFixed(1)+'°';
        document.getElementById('a-vis').textContent=aHz.alt>0?"YES":"NO";
        document.getElementById('a-vis').style.color=aHz.alt>0?"#0f8":"#f44";

        renderer.render(scene, camera); requestAnimationFrame(animate);
    }

    updCam(); fetchNASA(); animate();
    window.addEventListener('resize', () => { renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); });
});
</script>
</body>
</html>
