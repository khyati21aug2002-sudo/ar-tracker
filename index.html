<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Sky Tracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; color:#fff; user-select:none; }
canvas { display:block; }

.panel {
  position:fixed; background:rgba(0,10,30,0.9);
  border:1px solid rgba(0,180,255,0.22); border-radius:12px;
  padding:12px 16px; backdrop-filter:blur(8px);
  box-shadow:0 0 20px rgba(0,80,200,0.14); min-width:220px; z-index: 10;
}
.panel h1 { font-size:11px; letter-spacing:2px; margin-bottom:8px;
            padding-bottom:6px; border-bottom:1px solid rgba(0,180,255,0.18); }
.row { display:flex; justify-content:space-between; padding:4px 0; font-size:10px; }
.lbl { color:#3d7a9a; }
.val { color:#eee; font-weight:bold; }

#pa { top:env(safe-area-inset-top, 20px); left:15px; }
#pa h1 { color:#ff9900; }

#controls { position:fixed; bottom:30px; right:15px; display:flex; flex-direction:column; gap:8px; z-index:20; }
.btn { background:rgba(0,25,60,0.95); border:1px solid rgba(0,180,255,0.4);
       border-radius:10px; color:#fff; font-family:inherit;
       font-size:11px; padding:14px; cursor:pointer; min-width:180px; text-align:center; }
.btn-ar { background: #004488; border-color: #00eeff; font-weight: bold; }

#compass {
  position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
  font-size: 12px; letter-spacing: 3px; color: #00eeff; z-index: 10; text-shadow: 0 0 5px #000;
}

.reticle {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 40px; height: 40px; border: 1px solid rgba(0,238,255,0.3); pointer-events: none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="reticle"></div>

<div class="panel" id="pa">
  <h1>📡 TARGETING SYSTEM</h1>
  <div class="row"><span class="lbl">GPS</span><span class="val" id="u-gps">DEFAULT (Dehradun)</span></div>
  <div class="row"><span class="lbl">TARGET</span><span class="val" style="color:#ff9900;">ARTEMIS II</span></div>
  <div class="row"><span class="lbl">ALTITUDE</span><span class="val" id="a-alt">--</span></div>
  <div class="row"><span class="lbl">AZIMUTH</span><span class="val" id="a-az">--</span></div>
  <div class="row"><span class="lbl">VISIBLE?</span><span class="val" id="a-vis">--</span></div>
</div>

<div id="compass">HEADING: <span id="comp-dir">NORTH</span></div>

<div id="controls">
    <button class="btn" id="btn-gps" onclick="getLocation()">📍 Sync to Phone GPS</button>
    <button class="btn btn-ar" id="btn-gyro" onclick="initGyro()">📳 Enable AR (Gyroscope)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════
//  ENVIRONMENT & ASTRONOMY
// ═══════════════════════════════════════════════════
let MY_LAT = 30.3165, MY_LON = 78.0322; // Defaults to Dehradun
let arEnabled = false;
const R = 900;

// Star Data
const STARS = [[6.7525,-16.7161,-1.46,"Sirius"],[14.261,19.1822,-0.05,"Arcturus"],[18.616,38.7836,0.03,"Vega"],[5.2782,45.9980,0.08,"Capella"],[5.2423,-8.2016,0.13,"Rigel"],[7.6553,5.2250,0.38,"Procyon"],[5.9194,7.4070,0.50,"Betelgeuse"],[19.846,8.8683,0.76,"Altair"]];

// Math functions
function eqToAltAz(ra, dec, lat, lon, date) {
    const jd = date.getTime() / 86400000 + 2440587.5;
    const gmst = (18.697 + 24.0657 * (jd - 2451545.0)) % 24;
    let lst = (gmst + lon / 15 + 24) % 24;
    let ha = (lst - ra) * 15 * Math.PI/180;
    let rDec = dec * Math.PI/180, rLat = lat * Math.PI/180;
    let sAlt = Math.sin(rDec)*Math.sin(rLat) + Math.cos(rDec)*Math.cos(rLat)*Math.cos(ha);
    let alt = Math.asin(sAlt);
    let cAz = (Math.sin(rDec) - Math.sin(rLat)*sAlt) / (Math.cos(rLat)*Math.cos(alt));
    let sAz = (-Math.sin(ha)*Math.cos(rDec)) / Math.cos(alt);
    let az = Math.atan2(sAz, cAz);
    return { alt: alt * 180/Math.PI, az: (az * 180/Math.PI + 360) % 360 };
}

function altAzToVec3(alt, az, r) {
    const rAlt = alt * Math.PI/180, rAz = az * Math.PI/180;
    return new THREE.Vector3(r * Math.cos(rAlt) * Math.sin(rAz), r * Math.sin(rAlt), -r * Math.cos(rAlt) * Math.cos(rAz));
}

// ═══════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(innerWidth, innerHeight);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 5, 0); // Stand above ground
const sky = new THREE.Group(); scene.add(sky);

// Add Ground (Visible horizon)
const ground = new THREE.Mesh(new THREE.CircleGeometry(R, 32), new THREE.MeshBasicMaterial({color: 0x0a101a, side: THREE.DoubleSide}));
ground.rotation.x = -Math.PI/2; scene.add(ground);

// Add Stars
const starMeshes = STARS.map(s => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
    m._ra = s[0]; m._dec = s[1]; sky.add(m); return m;
});

// Add Artemis Target
const artemis = new THREE.Mesh(new THREE.SphereGeometry(12, 12, 12), new THREE.MeshBasicMaterial({color: 0xff9900}));
artemis._ra = 12.9; artemis._dec = -5.2; sky.add(artemis);

// ═══════════════════════════════════════════════════
//  CAMERA CONTROLS (DRAG FALLBACK + GYRO)
// ═══════════════════════════════════════════════════
let isDragging = false, prevM = {x:0, y:0};
let camLon = 180, camLat = 20;

// Touch / Mouse Drag Logic
renderer.domElement.addEventListener('touchstart', e => { if(!arEnabled) { isDragging=true; prevM={x:e.touches[0].clientX, y:e.touches[0].clientY}; }});
window.addEventListener('touchend', () => isDragging = false);
window.addEventListener('touchmove', e => {
    if (isDragging && !arEnabled) {
        camLon -= (e.touches[0].clientX - prevM.x) * 0.2;
        camLat -= (e.touches[0].clientY - prevM.y) * 0.2;
        camLat = Math.max(-10, Math.min(89, camLat));
        updateDragCamera();
        prevM = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    }
});

function updateDragCamera() {
    const phi = THREE.MathUtils.degToRad(90 - camLat);
    const theta = THREE.MathUtils.degToRad(camLon);
    camera.lookAt(camera.position.x + 100 * Math.sin(phi) * Math.sin(theta), camera.position.y + 100 * Math.cos(phi), camera.position.z - 100 * Math.sin(phi) * Math.cos(theta));
    updateCompassUI(camLon);
}

// AR Gyroscope Logic
async function initGyro() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
                arEnabled = true;
                document.getElementById('btn-gyro').textContent = "✅ AR ACTIVE";
                document.getElementById('btn-gyro').style.background = "#008844";
            } else {
                alert("Permission denied. You can still swipe to look around.");
            }
        } catch (e) { alert("Error accessing gyro."); }
    } else {
        window.addEventListener('deviceorientation', handleOrientation);
        arEnabled = true;
        document.getElementById('btn-gyro').textContent = "✅ AR ACTIVE";
    }
}

function handleOrientation(e) {
    if (!arEnabled) return;
    const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
    const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
    const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
    camera.quaternion.setFromEuler(new THREE.Euler(beta, alpha, -gamma, 'YXZ'));
    updateCompassUI(360 - e.alpha);
}

function updateCompassUI(degrees) {
    let d = (degrees % 360 + 360) % 360;
    let dir = "NORTH";
    if (d>45 && d<=135) dir="EAST"; else if (d>135 && d<=225) dir="SOUTH"; else if (d>225 && d<=315) dir="WEST";
    document.getElementById('comp-dir').textContent = dir;
}

// ═══════════════════════════════════════════════════
//  GPS LOGIC
// ═══════════════════════════════════════════════════
function getLocation() {
    const btn = document.getElementById('btn-gps');
    btn.textContent = "⏳ Locating...";
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                MY_LAT = pos.coords.latitude; MY_LON = pos.coords.longitude;
                document.getElementById('u-gps').textContent = "LIVE SYNCED ✅";
                btn.textContent = "✅ GPS Connected";
            },
            (err) => { 
                document.getElementById('u-gps').textContent = "DENIED BY iOS";
                btn.textContent = "❌ Check Settings"; 
                alert("Location denied! Check iOS Settings -> Safari -> Location to allow it.");
            }
        );
    }
}

// ═══════════════════════════════════════════════════
//  LOOP & ANIMATION
// ═══════════════════════════════════════════════════
function update() {
    const now = new Date();
    starMeshes.forEach(m => {
        const hz = eqToAltAz(m._ra, m._dec, MY_LAT, MY_LON, now);
        m.position.copy(altAzToVec3(hz.alt, hz.az, R-50));
        m.visible = hz.alt > -5;
    });

    const aHz = eqToAltAz(artemis._ra, artemis._dec, MY_LAT, MY_LON, now);
    artemis.position.copy(altAzToVec3(aHz.alt, aHz.az, R-60));
    
    document.getElementById('a-alt').textContent = `${aHz.alt.toFixed(1)}°`;
    document.getElementById('a-az').textContent = `${aHz.az.toFixed(1)}°`;
    document.getElementById('a-vis').textContent = aHz.alt > 0 ? "YES" : "NO (Below Horizon)";
    document.getElementById('a-vis').style.color = aHz.alt > 0 ? "#00ff88" : "#ff4444";

    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

// Fetch live NASA data
async function fetchLiveArtemis() {
    try {
        const now = new Date(), pad = n => String(n).padStart(2,'0');
        const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
        const res = await fetch(`https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='-1024'&OBJ_DATA='NO'&MAKE_EPHEM='YES'&EPHEM_TYPE='OBSERVER'&CENTER='500@399'&START_TIME='${ymd(now)}'&STOP_TIME='${ymd(new Date(now.getTime()+86400000))}'&STEP_SIZE='1 h'&QUANTITIES='1'`);
        const json = await res.json();
        const s = json.result.indexOf('$$SOE'), e = json.result.indexOf('$$EOE');
        if (s > -1) {
            const m = json.result.substring(s+5, e).trim().split('\n').pop().match(/\d{4}-\w{3}-\d{2}\s+\d{2}:\d{2}\s+\*?\s+(\d{1,2})\s+(\d{2})\s+([\d.]+)\s+([+-]\d{1,3})\s+(\d{2})\s+([\d.]+)/);
            if (m) {
                artemis._ra = +m[1] + +m[2]/60 + +m[3]/3600;
                artemis._dec = (+m[4] < 0 ? -1 : 1) * (Math.abs(+m[4]) + +m[5]/60 + +m[6]/3600);
            }
        }
    } catch(e) {}
}

updateDragCamera();
fetchLiveArtemis();
update();
</script>
</body>
</html>
